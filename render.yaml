databases:
  # PostgreSQL database
  - name: sareeshala-db
    plan: free

services:
  # Redis service for caching and Celery broker
  - type: redis
    name: sareeshala-redis
    ipAllowList: [] # internal only
    plan: free

  # Django Web Service
  - type: web
    name: sareeshala-backend
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn SareeShala.wsgi:application"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sareeshala-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sareeshala-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: EMAIL_HOST_PASSWORD
        sync: false # User must provide this manually in the dashboard later
      - key: PYTHON_VERSION
        value: 3.10.0

  # Celery Worker
  - type: worker
    name: sareeshala-worker
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "celery -A SareeShala worker --loglevel=info"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sareeshala-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sareeshala-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0
